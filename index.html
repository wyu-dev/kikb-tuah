  <style>
    :root {
      --primary: #0a2463;
      --secondary: #1e3a8a;
      --accent: #fbbf24;
      --light: #ffffff;
      --dark: #0f172a;
      --serif: 'Bodoni Moda', serif;
      --sans: 'Inter', sans-serif;
    }
    
    * { box-sizing: border-box; }
    html, body { height: 100%; margin: 0; padding: 0; }
    body {
      font-family: var(--sans);
      background-image: url('https://images.pexels.com/photos/22032439/pexels-photo-22032439.jpeg');
      background-size: cover;
      background-attachment: fixed;
      background-position: center;
      color: var(--light);
      overflow-x: hidden;
    }

    /* Decorative line dividers */
    .divider {
      height: 1px;
      background: linear-gradient(to right, transparent, rgba(251, 191, 36, 0.3), transparent);
      margin: 2rem 0;
    }

    /* Serif headline with subtle glow */
    .headline {
      font-family: var(--serif);
      font-size: clamp(2rem, 8vw, 4rem);
      font-weight: 700;
      letter-spacing: -0.02em;
      color: var(--light);
      text-align: center;
      margin: 0;
      background: linear-gradient(135deg, #fef3c7 0%, #fbbf24 50%, #f59e0b 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      animation: headline-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      opacity: 0;
    }

    @keyframes headline-in {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Subtitle */
    .subtitle {
      font-size: clamp(0.875rem, 3vw, 1.125rem);
      font-weight: 300;
      letter-spacing: 0.05em;
      color: rgba(255, 255, 255, 0.7);
      text-align: center;
      margin-top: 0.5rem;
      animation: subtitle-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.15s;
      opacity: 0;
    }

    @keyframes subtitle-in {
      0% { opacity: 0; transform: translateY(10px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Logo with sophisticated glow */
    .logo-container {
      margin-bottom: 2rem;
      animation: logo-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.05s;
      opacity: 0;
    }

    @keyframes logo-in {
      0% { opacity: 0; transform: scale(0.95); }
      100% { opacity: 1; transform: scale(1); }
    }

    .logo-img {
      height: clamp(80px, 12vw, 140px);
      width: auto;
      display: block;
      margin: 0 auto;
      animation: logo-glow 3s ease-in-out infinite;
      filter-brightness: 1.05;
    }

    @keyframes logo-glow {
      0%, 100% {
        filter: drop-shadow(0 0 8px rgba(255, 255, 255, 0.8))
                drop-shadow(0 0 16px rgba(255, 255, 255, 0.5))
                drop-shadow(0 0 28px rgba(255, 255, 255, 0.3))
                brightness(1.05);
      }
      50% {
        filter: drop-shadow(0 0 16px rgba(255, 255, 255, 1))
                drop-shadow(0 0 32px rgba(255, 255, 255, 0.7))
                drop-shadow(0 0 48px rgba(255, 255, 255, 0.4))
                brightness(1.08);
      }
    }

    /* Glass morphism panels */
    .glass-panel {
      background: rgba(255, 255, 255, 0.06);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 20px;
      padding: 2rem;
    }

    /* Display name card with white glow */
    .display-card {
      background: rgba(30, 58, 138, 0.4);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(251, 191, 36, 0.25);
      border-radius: 24px;
      padding: 3rem 2rem;
      text-align: center;
      margin: 2rem 0;
      animation: card-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.4s;
      opacity: 0;
    }

    @keyframes card-in {
      0% { opacity: 0; transform: translateY(20px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    .display-name {
      font-size: clamp(1.25rem, 4vw, 2.5rem);
      font-family: var(--serif);
      font-weight: 600;
      letter-spacing: -0.01em;
      color: var(--light);
      margin: 0;
      min-height: 1.2em;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      animation: pulse-white 2s ease-in-out infinite;
    }

    @keyframes pulse-white {
      0%, 100% {
        text-shadow: 0 0 30px rgba(255, 255, 255, 0.4),
                     0 0 60px rgba(255, 255, 255, 0.2);
      }
      50% {
        text-shadow: 0 0 60px rgba(255, 255, 255, 0.7),
                     0 0 100px rgba(255, 255, 255, 0.35);
      }
    }

    /* Action buttons */
    .btn-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #f59e0b 100%);
      color: var(--dark);
      font-family: var(--sans);
      font-weight: 600;
      font-size: 1rem;
      padding: 0.875rem 2rem;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      box-shadow: 0 8px 24px rgba(251, 191, 36, 0.25);
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }

    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(251, 191, 36, 0.35);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .btn-secondary {
      background: rgba(255, 255, 255, 0.1);
      color: var(--light);
      border: 1px solid rgba(255, 255, 255, 0.2);
      font-family: var(--sans);
      font-weight: 500;
      font-size: 0.875rem;
      padding: 0.75rem 1.5rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-secondary:hover {
      background: rgba(255, 255, 255, 0.15);
      border-color: rgba(255, 255, 255, 0.3);
    }

    /* Control area */
    .control-area {
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      justify-content: center;
      margin: 2rem 0;
      animation: controls-in 1s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.5s;
      opacity: 0;
    }

    @keyframes controls-in {
      0% { opacity: 0; transform: translateY(15px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* Winner pills */
    .winner-pill {
      background: rgba(251, 191, 36, 0.25);
      border: 2px solid rgba(251, 191, 36, 0.6);
      color: #ffffff;
      padding: 0.75rem 1.25rem;
      border-radius: 12px;
      font-size: 0.95rem;
      font-weight: 700;
      font-family: var(--serif);
      width: 100%;
      max-width: 600px;
      text-align: center;
      animation: pill-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      box-shadow: 0 4px 12px rgba(251, 191, 36, 0.2);
    }

    @keyframes pill-in {
      0% { opacity: 0; transform: scale(0.8) translateY(-10px); }
      100% { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* Header controls */
    .header-control {
      position: absolute;
      top: 1.5rem;
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.12);
      border-radius: 12px;
      width: 44px;
      height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: all 0.2s ease;
      color: rgba(255, 255, 255, 0.7);
    }

    .header-control:hover {
      background: rgba(255, 255, 255, 0.12);
      color: var(--light);
      border-color: rgba(255, 255, 255, 0.2);
    }

    /* Modal */
    .modal {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(15, 23, 42, 0.9);
      backdrop-filter: blur(8px);
      z-index: 1000;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: modal-in 0.3s ease;
    }

    @keyframes modal-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .modal.active {
      display: flex;
    }

    .modal-content {
      background: linear-gradient(135deg, rgba(10, 36, 99, 0.95) 0%, rgba(30, 58, 138, 0.95) 100%);
      border: 1px solid rgba(251, 191, 36, 0.2);
      border-radius: 20px;
      padding: 2rem;
      max-width: 500px;
      width: 100%;
      max-height: 90vh;
      overflow-y: auto;
      animation: modal-content-in 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes modal-content-in {
      0% { transform: scale(0.95); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }

    .modal-header {
      font-family: var(--serif);
      font-size: 1.5rem;
      font-weight: 600;
      color: var(--light);
      margin-bottom: 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .modal-close {
      font-size: 1.5rem;
      cursor: pointer;
      color: rgba(255, 255, 255, 0.6);
      transition: color 0.2s;
    }

    .modal-close:hover {
      color: var(--light);
    }

    .form-group {
      margin-bottom: 1.5rem;
    }

    .form-label {
      display: block;
      color: rgba(251, 191, 36, 0.9);
      font-size: 0.875rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      margin-bottom: 0.5rem;
      text-transform: uppercase;
    }

    .form-input {
      width: 100%;
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: var(--light);
      padding: 0.875rem;
      border-radius: 10px;
      font-family: var(--sans);
      font-size: 0.9375rem;
      resize: none;
    overflow-y: scroll;
    overflow-x: hidden;
      transition: all 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: rgba(251, 191, 36, 0.5);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 3px rgba(251, 191, 36, 0.1);
    }

    .modal-actions {
      display: grid;
      grid-template-columns: 1fr;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    .btn-modal-primary {
      background: linear-gradient(135deg, var(--accent) 0%, #f59e0b 100%);
      color: var(--dark);
      font-weight: 600;
      padding: 0.875rem;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-modal-primary:hover {
      transform: translateY(-1px);
    }

    .btn-modal-secondary {
      background: rgba(251, 191, 36, 0.1);
      border: 1px solid rgba(251, 191, 36, 0.2);
      color: rgba(251, 191, 36, 0.9);
      font-weight: 500;
      padding: 0.875rem;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-modal-secondary:hover {
      background: rgba(251, 191, 36, 0.15);
    }

    /* Badge */
    .badge {
      display: inline-block;
      background: rgba(251, 191, 36, 0.15);
      border: 1px solid rgba(251, 191, 36, 0.3);
      color: rgba(255, 255, 255, 0.9);
      padding: 0.375rem 0.875rem;
      border-radius: 20px;
      font-size: 0.8125rem;
      font-weight: 500;
      letter-spacing: 0.05em;
      animation: badge-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.6s;
      opacity: 0;
    }

    @keyframes badge-in {
      0% { opacity: 0; transform: scale(0.9); }
      100% { opacity: 1; transform: scale(1); }
    }

    /* Winners section */
    .winners-container {
      margin-top: 2rem;
      max-height: 40vh;
      overflow-y: auto;
      padding-right: 0.5rem;
      animation: winners-in 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
      animation-delay: 0.7s;
      opacity: 0;
    }

    @keyframes winners-in {
      0% { opacity: 0; }
      100% { opacity: 1; }
    }

    .winners-title {
      font-family: var(--serif);
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--accent);
      margin-bottom: 1rem;
      text-align: center;
    }

    .winners-list {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      align-items: center;
      width: 100%;
    }

    /* Animations for winner reveal */
    @keyframes winner-shuffle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.6; transform: scale(0.98); }
    }

    .shuffling .display-name {
      animation: winner-shuffle 0.1s infinite !important;
    }

    @keyframes winner-pop {
      0% { transform: scale(0.3); opacity: 0; }
      60% { transform: scale(1.12); }
      100% { transform: scale(1); opacity: 1; }
    }

    .winner-pop .display-name {
      animation: winner-pop 0.7s cubic-bezier(0.34, 1.56, 0.64, 1) !important;
    }

    /* Responsive */
    @media (max-width: 640px) {
      .glass-panel {
        padding: 1.5rem;
      }
      
      .display-card {
        padding: 2rem 1.5rem;
      }

      .modal-content {
        padding: 1.5rem;
      }

      .control-area {
        gap: 0.75rem;
      }
    }
  </style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>

    let isDrawing = false;

    // Sound engine
    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
        if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function tone(freq, duration, type = 'sine', volume = 0.2, delay = 0) {
        if (!soundEnabled || !audioCtx) return;
        const t = audioCtx.currentTime + delay;
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.type = type;
        osc.frequency.setValueAtTime(freq, t);
        gain.gain.setValueAtTime(0, t);
        gain.gain.linearRampToValueAtTime(volume, t + 0.01);
        gain.gain.exponentialRampToValueAtTime(0.001, t + duration);
        osc.connect(gain).connect(audioCtx.destination);
        osc.start(t);
        osc.stop(t + duration);
    }

    function playTick() { tone(1200, 0.04, 'square', 0.08); }

    function playDrumroll() {
        if (!soundEnabled || !audioCtx) return;
        for (let i = 0; i < 8; i++) {
            tone(80 + i * 5, 0.06, 'sawtooth', 0.1 + i * 0.015, i * 0.05);
        }
    }

    function playFanfare() {
        if (!soundEnabled || !audioCtx) return;
        tone(523.25, 0.15, 'triangle', 0.2, 0);
        tone(659.25, 0.15, 'triangle', 0.2, 0.08);
        tone(783.99, 0.15, 'triangle', 0.2, 0.16);
        tone(523.25, 0.6, 'triangle', 0.18, 0.25);
        tone(659.25, 0.6, 'triangle', 0.18, 0.25);
        tone(783.99, 0.6, 'triangle', 0.18, 0.25);
        tone(1046.50, 0.6, 'triangle', 0.15, 0.25);
        tone(2093, 0.3, 'sine', 0.1, 0.4);
        tone(2637, 0.3, 'sine', 0.08, 0.5);
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        localStorage.setItem('ld_sound', soundEnabled);
        document.getElementById('sound-icon').setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
        lucide.createIcons();
        if (soundEnabled) {
            initAudio();
            tone(800, 0.1, 'sine', 0.15);
        }
    }

    function updateUI() {
        const count = participants.length;
        document.getElementById('participant-badge').textContent = count + ' peserta';
        document.getElementById('empty-msg').classList.toggle('hidden', count > 0);
        document.getElementById('btn-start').disabled = count === 0;
        document.getElementById('btn-start').classList.toggle('opacity-50', count === 0);
        renderWinners();
    }

    function renderWinners() {
        const section = document.getElementById('winners-section');
        const list = document.getElementById('winners-list');
        if (winners.length === 0) {
            section.classList.add('hidden');
            return;
        }
        section.classList.remove('hidden');
        list.innerHTML = winners.map((w, i) => {
            const number = winners.length - i; // Reverse numbering
            return `<div class="winner-pill"><span style="font-weight: 900; color: #fbbf24;">#${number}</span> ${w}</div>`;
        }).join('');
    }

    function openModal() {
        document.getElementById('names-input').value = participants.join('\n');
        document.getElementById('modal').classList.add('active');
    }

    function closeModal() {
        document.getElementById('modal').classList.remove('active');
    }

    function saveNames() {
        const raw = document.getElementById('names-input').value;
        participants = raw.split('\n').map(n => n.trim()).filter(n => n.length > 0);
        localStorage.setItem('ld_participants', JSON.stringify(participants));
        updateUI();
        closeModal();
    }

    function loadDefaultList() {
        if (confirm('Muatkan senarai 93 ahli KIKB?')) {
            document.getElementById('names-input').value = defaultParticipants.join('\n');
        }
    }

    function resetUndian() {
        if (!confirm('Reset undian? Semua pemenang akan dipadam.')) return;
        participants = [...participants, ...winners];
        winners = [];
        localStorage.setItem('ld_participants', JSON.stringify(participants));
        localStorage.setItem('ld_winners', JSON.stringify(winners));
        document.getElementById('name-display').textContent = '—';
        document.getElementById('name-display').parentElement.classList.remove('winner-pop', 'shuffling');
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-start').classList.remove('hidden');
        updateUI();
        closeModal();
    }

    function clearAll() {
        if (!confirm('Padam SEMUA peserta dan pemenang?')) return;
        participants = [];
        winners = [];
        localStorage.setItem('ld_participants', JSON.stringify(participants));
        localStorage.removeItem('ld_winners');
        document.getElementById('name-display').textContent = '—';
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-start').classList.remove('hidden');
        updateUI();
        closeModal();
    }

    function startDraw() {
        if (isDrawing || participants.length === 0) return;
        initAudio();
        isDrawing = true;
        const display = document.getElementById('name-display').parentElement;
        display.classList.add('shuffling');
        document.getElementById('btn-start').classList.add('hidden');

        let elapsed = 0;
        let drumrollTriggered = false;
        const interval = setInterval(() => {
            document.getElementById('name-display').textContent = participants[Math.floor(Math.random() * participants.length)];
            playTick();
            elapsed += 50;
            if (elapsed >= 2000 && !drumrollTriggered) {
                drumrollTriggered = true;
                playDrumroll();
            }
            if (elapsed >= 2500) {
                clearInterval(interval);
                pickWinner(display);
            }
        }, 50);
    }

    function pickWinner(display) {
        const idx = Math.floor(Math.random() * participants.length);
        const winner = participants.splice(idx, 1)[0];
        winners.unshift(winner); // unshift = tambah di depan (newest first)
        localStorage.setItem('ld_participants', JSON.stringify(participants));
        localStorage.setItem('ld_winners', JSON.stringify(winners));

        // Set display to actual winner name
        display.classList.remove('shuffling');
        display.classList.add('winner-pop');
        document.getElementById('name-display').textContent = winner;
        
        playFanfare();

        setTimeout(() => {
            try {
                confetti({
                    particleCount: 200,
                    spread: 100,
                    origin: { x: 0.5, y: 0.5 },
                    colors: ['#fbbf24', '#f59e0b', '#fde68a', '#ffffff', '#3b82f6', '#1e40af']
                });
                setTimeout(() => {
                    confetti({
                        particleCount: 150,
                        spread: 120,
                        origin: { x: 0.5, y: 0.5 },
                        colors: ['#fbbf24', '#fde68a', '#ffd700', '#ffffff']
                    });
                }, 300);
                setTimeout(() => {
                    confetti({
                        particleCount: 100,
                        spread: 90,
                        origin: { x: 0.5, y: 0.5 },
                        colors: ['#f59e0b', '#fbbf24', '#60a5fa', '#ffffff']
                    });
                }, 600);
            } catch (e) {
                console.log('Confetti error:', e);
            }
        }, 200);

        document.getElementById('btn-next').classList.remove('hidden');
        isDrawing = false;
        updateUI();
    }

    function nextDraw() {
        const display = document.getElementById('name-display').parentElement;
        display.classList.remove('winner-pop', 'shuffling');
        document.getElementById('name-display').textContent = '—';
        document.getElementById('btn-next').classList.add('hidden');
        document.getElementById('btn-start').classList.remove('hidden');
        if (participants.length === 0) {
            document.getElementById('name-display').textContent = '🎉 Tamat!';
        } else {
            setTimeout(() => startDraw(), 500);
        }
    }

    // Initialize
    if (stored === null) {
        localStorage.setItem('ld_participants', JSON.stringify(participants));
    }
    
    updateUI();
    lucide.createIcons();
    document.getElementById('sound-icon').setAttribute('data-lucide', soundEnabled ? 'volume-2' : 'volume-x');
    lucide.createIcons();
  </script>
 </body>
</html>
